name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/souluanf/online-survey-api

jobs:
  changes:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2
      - id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          api=false
          web=false
          if echo "$CHANGED" | grep -qE '^(src/|Dockerfile|k8s/|\.github/workflows/deploy\.yml$)'; then
            api=true
          fi
          if echo "$CHANGED" | grep -qE '^(web/|\.github/workflows/deploy\.yml$)'; then
            web=true
          fi
          echo "api=$api" >> "$GITHUB_OUTPUT"
          echo "web=$web" >> "$GITHUB_OUTPUT"

  api:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:latest,${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Install Doppler CLI
        run: |
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update && sudo apt-get install -y doppler

      - name: Inject Doppler secrets into manifests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          export APP_HOST=$(doppler secrets get APP_HOST --plain --token $DOPPLER_TOKEN --project online-survey-api --config prd)
          envsubst '${APP_HOST}' < k8s/ingress.yaml > k8s/ingress.yaml.tmp && mv k8s/ingress.yaml.tmp k8s/ingress.yaml
          envsubst '${IMAGE_TAG}' < k8s/deployment.yaml > k8s/deployment.yaml.tmp && mv k8s/deployment.yaml.tmp k8s/deployment.yaml

      - name: Generate postgres secret manifest
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          POSTGRES_DB=$(doppler secrets get POSTGRES_DB --plain --token $DOPPLER_TOKEN --project online-survey-api --config prd)
          POSTGRES_USER=$(doppler secrets get POSTGRES_USER --plain --token $DOPPLER_TOKEN --project online-survey-api --config prd)
          POSTGRES_PASSWORD=$(doppler secrets get POSTGRES_PASSWORD --plain --token $DOPPLER_TOKEN --project online-survey-api --config prd)
          cat > k8s/postgres-secret.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: survey-postgres-secret
            namespace: survey
          type: Opaque
          stringData:
            POSTGRES_DB: "${POSTGRES_DB}"
            POSTGRES_USER: "${POSTGRES_USER}"
            POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
          EOF

      - name: Copy manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "k8s/"
          target: "/tmp/survey"

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            kubectl apply -f /tmp/survey/k8s/namespace.yaml
            kubectl apply -f /tmp/survey/k8s/postgres-secret.yaml
            kubectl apply -f /tmp/survey/k8s/postgres.yaml
            kubectl apply -f /tmp/survey/k8s/
            kubectl rollout restart deployment/survey-api -n survey

  web:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Doppler CLI
        run: |
          curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo gpg --dearmor -o /usr/share/keyrings/doppler-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/doppler-archive-keyring.gpg] https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list
          sudo apt-get update && sudo apt-get install -y doppler

      - name: Build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --token $DOPPLER_TOKEN --project online-survey-api --config prd -- npm run build

      - name: Deploy to Cloudflare Pages
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          export CLOUDFLARE_API_TOKEN=$(doppler secrets get CLOUDFLARE_API_TOKEN --plain --token $DOPPLER_TOKEN --project online-survey-api --config prd)
          export CLOUDFLARE_ACCOUNT_ID=$(doppler secrets get CLOUDFLARE_ACCOUNT_ID --plain --token $DOPPLER_TOKEN --project online-survey-api --config prd)
          npx wrangler pages deploy out --project-name=online-survey-web --branch=main --commit-dirty=true
